Builds:
  - versionName: 1.5.15
    versionCode: 39
    commit: 3f039f6270fc162adf55ab5509c6605ab448c6ca
    output: build/app/outputs/flutter-apk/app-fdroid-release.apk
    srclibs:
      - flutter@stable
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild: "sed -i -e '/org.gradle.java.home/d' android/gradle.properties\nsed
      -i -e '/in_app_review:/d' pubspec.yaml\nsed -i -e '/import.*in_app_review.dart/d'
      lib/features/home/home_screen.dart\nsed -i -e 's/InAppReview/dynamic/g' lib/features/home/home_screen.dart\n
      sed -i -e 's/dynamic.instance/null/g' lib/features/home/home_screen.dart\nsed
      -i -e 's/await inAppReview.isAvailable()/false/g' lib/features/home/home_screen.dart\n
      mkdir -p lib/core/utils\necho \"import 'package:flutter/material.dart';\" >
      lib/core/utils/review_helper.dart\necho \"import 'package:hdict/features/settings/settings_provider.dart';\"
      >> lib/core/utils/review_helper.dart\necho \"class ReviewHelper {\" >> lib/core/utils/review_helper.dart\n
      echo \"  static Future<void> maybeRequestReview(BuildContext context, SettingsProvider
      settings) async {}\" >> lib/core/utils/review_helper.dart\necho \"}\" >> lib/core/utils/review_helper.dart\n
      unset JAVA_HOME\n../srclib/flutter/bin/flutter config --no-analytics\n../srclib/flutter/bin/flutter
      pub get"
    build: "unset JAVA_HOME\n../srclib/flutter/bin/flutter build apk --flavor fdroid
      --release"

AutoUpdateMode: Version
UpdateCheckMode: Tags
