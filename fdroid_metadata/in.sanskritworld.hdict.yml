    versionCode: 38
    commit: v1.5.14
    subdir: .
    prebuild: |
      rm -fr ios
    build: |
      export PATH=$flutter/bin:$PATH
      flutter build apk --flavor fdroid --release
    output: build/app/outputs/apk/fdroid/release/app-fdroid-release.apk

# For reproducible builds - using upstream signed APK
Binaries: https://github.com/drdhaval2785/hdict/releases/download/v%v/hdict-%v-fdroid.apk