name: FastForge Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          # Remove build number suffix (e.g., +40) from version
          VERSION=${VERSION%%+*}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$VERSION" >> $GITHUB_OUTPUT

  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          # Write key.properties so Gradle's signingConfig can find all values.
          # This file is gitignored and must be generated in CI from secrets.
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" \
            > android/key.properties
        shell: bash

      - name: Build Android APK
        run: flutter build apk --release --flavor play

      - name: Build Android AAB
        run: flutter build appbundle --release --flavor play

      - name: Clean up signing files
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties

      - name: Copy and rename artifacts
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-play-release.apk dist/hdict-$VERSION-android.apk
          cp build/app/outputs/bundle/playRelease/app-play-release.aab dist/hdict-$VERSION-android.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: dist/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev locate rpm patchelf libarchive-tools zstd

      - name: Install appimagetool
        run: |
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          # Extract the AppImage tool to bypass FUSE requirements on runner
          ./appimagetool --appimage-extract
          sudo mv squashfs-root /opt/appimagetool
          sudo ln -s /opt/appimagetool/AppRun /usr/local/bin/appimagetool

      - name: Build Linux (Partial)
        run: |
          # We exclude pacman from fastforge because we build it natively below
          fastforge package --platform=linux --targets=appimage,deb,rpm,zip
        shell: bash

      - name: Build Native Pacman Package
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          # 1. Prepare packaging directory
          PKG_DIR="pkg_pacman"
          mkdir -p $PKG_DIR/usr/bin
          mkdir -p $PKG_DIR/usr/share/hdict
          mkdir -p $PKG_DIR/usr/share/applications
          mkdir -p $PKG_DIR/usr/share/icons/hicolor/256x256/apps
          
          # 2. Copy build output (flutter build was run by fastforge)
          if [ ! -d "build/linux/x64/release/bundle" ]; then
            echo "Error: Flutter build output not found in build/linux/x64/release/bundle"
            exit 1
          fi
          cp -r build/linux/x64/release/bundle/* $PKG_DIR/usr/share/hdict/
          
          # 3. Create symlink to binary
          ln -s /usr/share/hdict/hdict $PKG_DIR/usr/bin/hdict
          
          # 4. Create Desktop entry
          (
            echo "[Desktop Entry]"
            echo "Name=hdict"
            echo "GenericName=Dictionary Reader"
            echo "Comment=Dictionary Reader App for StarDict, Dictd, Slob and Mdict dictionaries"
            echo "Exec=hdict %U"
            echo "Icon=hdict"
            echo "Terminal=false"
            echo "Type=Application"
            echo "Categories=Utility;"
            echo "StartupNotify=true"
          ) > $PKG_DIR/usr/share/applications/hdict.desktop

          # 5. Copy Icon
          cp assets/hdict_logo.png $PKG_DIR/usr/share/icons/hicolor/256x256/apps/hdict.png
          
          # 6. Generate .PKGINFO
          PKG_VER=$(echo $VERSION | sed 's/+/./g')
          PKG_SIZE=$(du -sk $PKG_DIR | cut -f1)
          
          (
            echo "pkgname = hdict"
            echo "pkgver = $PKG_VER"
            echo "pkgrel = 1"
            echo "pkgdesc = Dictionary Reader App for StarDict, Dictd, Slob and Mdict dictionaries"
            echo "url = https://github.com/drdhaval2785/hdict"
            echo "builddate = $(date +%s)"
            echo "packager = Dr. Dhaval Patel <drdhaval2785@gmail.com>"
            echo "size = $((PKG_SIZE * 1024))"
            echo "arch = x86_64"
            echo "license = GPL3"
            echo "depend = gtk3"
            echo "depend = libx11"
          ) > $PKG_DIR/.PKGINFO

          # 7. Generate .MTREE
          (cd $PKG_DIR && bsdtar -czf .MTREE --format=mtree --options="!all,use-set,type,uid,gid,mode,time,size,md5,sha256,link" .PKGINFO usr)
          
          # 8. Create the final package and move to dist folder
          # Standard Arch naming: pkgname-pkgver-pkgrel-arch.pkg.tar.zst
          FINAL_NAME="hdict-$PKG_VER-1-x86_64.pkg.tar.zst"
          mkdir -p dist
          # NOTE: Removed -n flag to allow recursion into usr/ directory
          (cd $PKG_DIR && bsdtar --uid 0 --gid 0 -cf - .PKGINFO .MTREE usr) | zstd -c > "dist/$FINAL_NAME"
          
          rm -rf $PKG_DIR
        shell: bash

      - name: Flatten and Clean Artifacts
        run: |
          # Move all files from subdirectories to the root of dist/
          # This handles cases where fastforge creates versioned subdirectories
          mkdir -p dist_tmp
          find dist -type f -exec mv {} dist_tmp/ \;
          rm -rf dist
          mv dist_tmp dist
        shell: bash

      - name: Rename Artifacts for Release
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          cd dist
          # Enable nullglob so globs that don't match expand to nothing instead of causing errors
          shopt -s nullglob
          
          # Rename AppImage (if not already named correctly)
          for f in hdict*.AppImage; do
             if [ "$f" != "hdict-$VERSION-linux.AppImage" ]; then
               mv "$f" "hdict-$VERSION-linux.AppImage"
             fi
          done
          
          # Rename other packages
          for ext in deb rpm zip; do
            for f in hdict*.$ext; do
               if [ "$f" != "hdict-$VERSION-linux.$ext" ]; then
                 mv "$f" "hdict-$VERSION-linux.$ext"
               fi
            done
          done
        shell: bash

      - name: Re-pack AppImage with Update Info
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          cd dist
          APPIMAGE="hdict-$VERSION-linux.AppImage"
          
          if [ -f "$APPIMAGE" ]; then
            echo "Found AppImage at $APPIMAGE. Re-packing with update info..."
            chmod +x "$APPIMAGE"
            # Bypass FUSE using extract-and-run environment variable
            export APPIMAGE_EXTRACT_AND_RUN=1
            ./"$APPIMAGE" --appimage-extract
            
            # Use the extracted appimagetool binary
            appimagetool -u "gh-releases-zsync|drdhaval2785|hdict|latest|hdict-*-linux.AppImage.zsync" \
              squashfs-root/ \
              "$APPIMAGE"
              
            # Clean up extracted dir
            rm -rf squashfs-root
          else
            echo "Warning: AppImage $APPIMAGE not found for re-packing."
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Download sqlite3.dll and Package
        run: |
          # 1. Find the actual build output directory dynamically
          $exePath = Get-ChildItem -Path build\windows -Filter hdict.exe -Recurse -File | Select-Object -First 1
          if (-not $exePath) { Write-Error "hdict.exe not found. Build failed?"; exit 1 }
          $buildDir = $exePath.Directory.FullName
          Write-Host "Found Windows build directory at: $buildDir"
          
          # 2. Download latest sqlite3.dll for x64
          $page = Invoke-WebRequest -Uri 'https://www.sqlite.org/download.html' -UseBasicParsing
          $match = [regex]::Match($page.Content, '(\d{4}/sqlite-dll-win-x64-\d+\.zip)')
          if (-not $match.Success) { Write-Error 'Could not find sqlite3 download path'; exit 1 }
          $path = $match.Groups[1].Value
          Invoke-WebRequest -Uri "https://www.sqlite.org/$path" -OutFile sqlite.zip
          Expand-Archive -Path sqlite.zip -DestinationPath sqlite_temp -Force
          
          # 3. Inject dll into the active build directory
          Copy-Item sqlite_temp\sqlite3.dll "$buildDir\"
          Remove-Item -Recurse -Force sqlite.zip, sqlite_temp
          
          # 4. Zip the entire application bundle
          $version = "${{ needs.get-version.outputs.version }}"
          Set-Location -Path $buildDir
          7z a -tzip "hdict-$version-windows.zip" *
          
          # 5. Move zip to a predictable folder for GitHub artifact upload
          Set-Location -Path $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path dist-windows
          Move-Item -Path "$buildDir\hdict-$version-windows.zip" -Destination dist-windows\
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist-windows/*.zip
          retention-days: 7

  publish-ppa:
    needs: [get-version, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput dpkg-dev

      - name: Import GPG Key
        run: |
          if [ -z "${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}" ]; then
            echo "Error: LAUNCHPAD_GPG_PRIVATE_KEY secret is missing or empty."
            exit 1
          fi
          echo "${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}" > private.key
          gpg --import --batch private.key
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep "^sec" | head -n 1 | cut -d: -f5)
          if [ -z "$KEY_ID" ]; then
            echo "Error: No secret key found after import."
            exit 1
          fi
          echo "GPG_KEY_ID=$KEY_ID" >> $GITHUB_ENV
          rm private.key

      - name: Publish to PPA
        env:
          GPG_PASSPHRASE: ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          # 1. Extract the built files from the .deb to get the structure
          DEB_FILE=$(ls dist/hdict-*-linux.deb | head -n 1)
          if [ -z "$DEB_FILE" ]; then 
            echo "Error: No .deb file found in dist/"
            ls dist/
            exit 1
          fi
          echo "Using $DEB_FILE for PPA preparation"
          mkdir -p extracted
          dpkg-deb -x "$DEB_FILE" extracted/
          
          # Remove some debian-specific metadata that might be in the .deb
          rm -rf extracted/DEBIAN
          
          for DISTRO in focal jammy noble; do
            echo "::group::Preparing package for $DISTRO"
            
            # Debian source directory must be <pkg>-<version>
            PKG_DIR="hdict-$VERSION"
            mkdir -p "$PKG_DIR"
            
            # Copy all files from the extracted .deb into the source dir
            cp -r extracted/* "$PKG_DIR/"
            
            # Create the debian/ directory
            mkdir -p "$PKG_DIR/debian"
            mkdir -p "$PKG_DIR/debian/source"
            echo "3.0 (quilt)" > "$PKG_DIR/debian/source/format"
            echo "13" > "$PKG_DIR/debian/compat"
            
            # Control file
            cat <<EOF | sed 's/^            //' > "$PKG_DIR/debian/control"
            Source: hdict
            Section: utils
            Priority: optional
            Maintainer: Dr. Dhaval Patel <drdhaval2785@gmail.com>
            Build-Depends: debhelper-compat (= 13)
            Standards-Version: 4.5.0
            Homepage: https://github.com/drdhaval2785/hdict

            Package: hdict
            Architecture: any
            Depends: \${shlibs:Depends}, \${misc:Depends}, libgtk-3-0, libx11-6, liblzma5
            Description: Dictionary Reader App for StarDict, Dictd, Slob and Mdict dictionaries
             Dictionary Reader App supporting various popular formats with high performance.
            EOF

            # Changelog
            cat <<EOF | sed 's/^            //' > "$PKG_DIR/debian/changelog"
            hdict ($VERSION-1~$DISTRO) $DISTRO; urgency=low

              * Automated PPA build for $DISTRO.

             -- Dr. Dhaval Patel <drdhaval2785@gmail.com>  $(date -R)
            EOF

            # Rules file
            cat <<EOF | sed 's/^            //' > "$PKG_DIR/debian/rules"
            #!/usr/bin/make -f
            %:
            	dh \$@

            override_dh_auto_build:
            	# Pre-compiled binaries

            override_dh_auto_install:
            	mkdir -p \$(CURDIR)/debian/hdict
            	cp -r \$(CURDIR)/usr \$(CURDIR)/debian/hdict/
            EOF
            chmod +x "$PKG_DIR/debian/rules"

            # Create the orig.tar.gz
            tar -czf "hdict_$VERSION.orig.tar.gz" --exclude=debian "$PKG_DIR"
            
            # Build the source package
            cd "$PKG_DIR"
            debuild -S -sa -k$GPG_KEY_ID --gpg-options="--batch --passphrase $GPG_PASSPHRASE --pinentry-mode loopback"
            cd ..
            
            # Upload to Launchpad
            CHANGES_FILE="hdict_${VERSION}-1~${DISTRO}_source.changes"
            if [ -f "$CHANGES_FILE" ]; then
              dput ppa:drdhaval2785/hdict "$CHANGES_FILE"
            else
              echo "Error: Changes file $CHANGES_FILE not found"
              ls -l
              exit 1
            fi
            
            # Clean up for next distro
            rm -rf "$PKG_DIR" hdict_${VERSION}*
            
            echo "::endgroup::"
          done

  create-release:
    needs: [get-version, build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: linux-artifacts

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: android-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: windows-artifacts

      - name: Sanitize and Rename Artifacts
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          mkdir -p release-artifacts
          
          # Use shopt nullglob to avoid errors if a pattern matches nothing
          shopt -s nullglob

          # Copy everything from artifact download locations to the release folder
          # This is much more robust than individual cp commands
          cp linux-artifacts/* release-artifacts/ 2>/dev/null || true
          cp android-artifacts/* release-artifacts/ 2>/dev/null || true
          cp windows-artifacts/* release-artifacts/ 2>/dev/null || true

          # Double check if any critical artifacts are missing and log it
          ls -R release-artifacts/
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.release_tag }}
          name: ${{ needs.get-version.outputs.release_tag }}
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
