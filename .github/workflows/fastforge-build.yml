name: FastForge Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          # Remove build number suffix (e.g., +40) from version
          VERSION=${VERSION%%+*}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=v$VERSION" >> $GITHUB_OUTPUT

  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          # Write key.properties so Gradle's signingConfig can find all values.
          # This file is gitignored and must be generated in CI from secrets.
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
        shell: bash

      - name: Build Android APK
        run: flutter build apk --release --flavor play

      - name: Build Android AAB
        run: flutter build appbundle --release --flavor play

      - name: Clean up signing files
        run: |
          rm -f android/upload-keystore.jks
          rm -f android/key.properties

      - name: Copy and rename artifacts
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-play-release.apk dist/hdict-$VERSION-android.apk
          cp build/app/outputs/bundle/playRelease/app-play-release.aab dist/hdict-$VERSION-android.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: dist/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev locate rpm patchelf libarchive-tools

      - name: Install appimagetool
        run: |
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Build Linux
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          fastforge package --platform=linux --targets=appimage,deb,rpm,zip,pacman
          
          # Extract and re-pack AppImage with update info to enable delta updates
          APPIMAGE=$(find dist -name "*.AppImage" | head -n 1)
          
          if [ -f "$APPIMAGE" ]; then
            echo "Found AppImage at $APPIMAGE. Re-packing with update info..."
            chmod +x "$APPIMAGE"
            ./"$APPIMAGE" --appimage-extract
            
            # Use appimagetool to build it again with update information
            # This will also generate the .zsync file automatically
            appimagetool -u "gh-releases-zsync|drdhaval2785|hdict|latest|hdict-*-x86_64.AppImage.zsync" \
              squashfs-root/ \
              "$APPIMAGE"
              
            # Clean up extracted dir
            rm -rf squashfs-root
          else
            echo "Warning: AppImage not found for re-packing."
          fi

      - name: Flatten and Clean Artifacts
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          # Move all generated files (AppImage, zsync, deb, rpm, etc.) to the root of dist/
          find dist -type f -exec mv -t dist/ {} +
          # Remove now-empty directories
          find dist -type d -empty -delete
        shell: bash

      - name: Rename Artifacts for Release
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          cd dist
          # Rename AppImage to include linux suffix
          if [ -f "hdict-$VERSION.AppImage" ]; then
            mv "hdict-$VERSION.AppImage" "hdict-$VERSION-linux.AppImage"
          fi
          # Rename zsync
          if [ -f "hdict-$VERSION.AppImage.zsync" ]; then
            mv "hdict-$VERSION.AppImage.zsync" "hdict-$VERSION-linux.zsync"
          fi
          # Rename deb, rpm, pacman, zip if they exist
          for ext in deb rpm pacman zip; do
            if [ -f "hdict-$VERSION.$ext" ]; then
              mv "hdict-$VERSION.$ext" "hdict-$VERSION-linux.$ext"
            fi
          done
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Download sqlite3.dll and Package
        run: |
          # 1. Find the actual build output directory dynamically
          $exePath = Get-ChildItem -Path build\windows -Filter hdict.exe -Recurse -File | Select-Object -First 1
          if (-not $exePath) { Write-Error "hdict.exe not found. Build failed?"; exit 1 }
          $buildDir = $exePath.Directory.FullName
          Write-Host "Found Windows build directory at: $buildDir"
          
          # 2. Download latest sqlite3.dll for x64
          $page = Invoke-WebRequest -Uri 'https://www.sqlite.org/download.html' -UseBasicParsing
          $match = [regex]::Match($page.Content, '(\d{4}/sqlite-dll-win-x64-\d+\.zip)')
          if (-not $match.Success) { Write-Error 'Could not find sqlite3 download path'; exit 1 }
          $path = $match.Groups[1].Value
          Invoke-WebRequest -Uri "https://www.sqlite.org/$path" -OutFile sqlite.zip
          Expand-Archive -Path sqlite.zip -DestinationPath sqlite_temp -Force
          
          # 3. Inject dll into the active build directory
          Copy-Item sqlite_temp\sqlite3.dll "$buildDir\"
          Remove-Item -Recurse -Force sqlite.zip, sqlite_temp
          
          # 4. Zip the entire application bundle
          $version = "${{ needs.get-version.outputs.version }}"
          Set-Location -Path $buildDir
          7z a -tzip "hdict-$version-windows.zip" *
          
          # 5. Move zip to a predictable folder for GitHub artifact upload
          Set-Location -Path $env:GITHUB_WORKSPACE
          New-Item -ItemType Directory -Force -Path dist-windows
          Move-Item -Path "$buildDir\hdict-$version-windows.zip" -Destination dist-windows\
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist-windows/*.zip
          retention-days: 7

  create-release:
    needs: [get-version, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: linux-artifacts

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: windows-artifacts

      - name: Sanitize and Rename Artifacts
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          mkdir -p release-artifacts
          cd release-artifacts

          # Linux artifacts (AppImage with zsync)
          if [ -f ../linux-artifacts/hdict-$VERSION-linux.AppImage ]; then
            cp ../linux-artifacts/hdict-$VERSION-linux.AppImage ./hdict-$VERSION-linux.AppImage
          fi
          if [ -f ../linux-artifacts/hdict-$VERSION-linux.AppImage.zsync ]; then
            cp ../linux-artifacts/hdict-$VERSION-linux.AppImage.zsync ./hdict-$VERSION-linux.zsync
          fi

          # Linux packages (deb, rpm, pacman)
          for ext in deb rpm pacman; do
            file=$(find ../linux-artifacts -name "*.$ext" | head -n 1)
            if [ -n "$file" ]; then
              cp "$file" ./hdict-$VERSION-linux.$ext
            fi
          done

          # Linux zip
          if [ -f ../linux-artifacts/hdict-$VERSION-linux.zip ]; then
            cp ../linux-artifacts/hdict-$VERSION-linux.zip ./hdict-$VERSION-linux.zip
          fi

          # Windows zip
          if [ -f ../windows-artifacts/hdict-$VERSION-windows.zip ]; then
            cp ../windows-artifacts/hdict-$VERSION-windows.zip ./hdict-$VERSION-windows.zip
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.release_tag }}
          name: ${{ needs.get-version.outputs.release_tag }}
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
