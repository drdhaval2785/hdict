name: FastForge Build

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
        shell: bash

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Android APK
        run: flutter build apk --release --flavor play

      - name: Build Android AAB
        run: flutter build appbundle --release --flavor play

      - name: Clean up keystore
        run: rm -f android/upload-keystore.jks

      - name: Copy and rename artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-play-release.apk dist/hdict-$VERSION-android.apk
          cp build/app/outputs/bundle/playRelease/app-play-release.aab dist/hdict-$VERSION-android.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: dist/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev locate rpm patchelf libarchive-tools

      - name: Install appimagetool
        run: |
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Linux
        run: fastforge package --platform=linux --targets=appimage,deb,rpm,zip,pacman

      - name: Rename output directory
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Rename the version folder from 1.5.16+40 to hdict-{version}
          for dir in dist/*/; do
            if [ -d "$dir" ]; then
              mv "$dir" "dist/hdict-$VERSION"
            fi
          done
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Install dependencies
        run: flutter pub get

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Windows EXE
        run: flutter build windows --release

      - name: Download sqlite3.dll
        run: |
          # Fetch the latest SQLite version number from the download page
          $page = Invoke-WebRequest -Uri 'https://www.sqlite.org/download.html' -UseBasicParsing
          $match = [regex]::Match($page.Content, 'sqlite-dll-win-x64-(\d+)\.zip')
          if (-not $match.Success) { Write-Error 'Could not find sqlite3 version'; exit 1 }
          $ver = $match.Groups[1].Value
          $year = [regex]::Match($page.Content, '/([0-9]{4})/sqlite-dll-win-x64').Groups[1].Value
          Invoke-WebRequest -Uri "https://www.sqlite.org/$year/sqlite-dll-win-x64-$ver.zip" -OutFile sqlite.zip
          Expand-Archive -Path sqlite.zip -DestinationPath sqlite_temp -Force
          Copy-Item sqlite_temp\sqlite3.dll build\windows\x64\release\bundle\
          Remove-Item -Recurse -Force sqlite.zip, sqlite_temp
        shell: pwsh

      - name: Rename and zip Windows artifacts
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cd build/windows/x64/release/bundle
          7z a -tzip hdict-$VERSION-windows.zip *
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: build/windows/x64/release/bundle/*.zip
          retention-days: 7